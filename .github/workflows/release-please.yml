name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      # No bundler: inject telemetry defaults into the published source right
      # before publish. The website id is a non-secret repo variable.
      - name: Inject telemetry defaults
        if: ${{ steps.release.outputs.release_created }}
        env:
          UMAMI_HOST: https://a.kunchenguid.com
          UMAMI_WEBSITE_ID: ${{ vars.JUSTROLL_UMAMI_WEBSITE_ID }}
        run: |
          cat > src/telemetry-defaults.js <<EOF
          export const BUILD_UMAMI_HOST = "${UMAMI_HOST}";
          export const BUILD_UMAMI_WEBSITE_ID = "${UMAMI_WEBSITE_ID}";
          EOF

      - run: npm publish --access public --provenance
        if: ${{ steps.release.outputs.release_created }}
